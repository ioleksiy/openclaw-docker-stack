services:
  ocbot:
    user: root
    image: ghcr.io/openclaw/openclaw:latest
    restart: unless-stopped
    environment:
      - HOME=/home/node
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - TELEGRAM_OWNER_ID=${TELEGRAM_OWNER_ID}
      - OPENCLAW_CONFIG_PATH=/home/node/.openclaw/openclaw.json
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        chown -R node:node /home/node/.openclaw
        printf '{"gateway":{"mode":"local"},"channels":{"telegram":{"enabled":true,"dmPolicy":"allowlist","allowFrom":[%s]}}}\n' "$TELEGRAM_OWNER_ID" > /home/node/.openclaw/openclaw.json
        exec setpriv --reuid=node --regid=node --init-groups -- node dist/index.js gateway
    volumes:
      - oc-config:/home/node/.openclaw
      - oc-workspace:/home/node/.openclaw/workspace
    deploy:
      replicas: 1
      restart_policy:
        condition: any

volumes:
  oc-config:
  oc-workspace:
