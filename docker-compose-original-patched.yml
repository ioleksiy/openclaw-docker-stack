services:
  ocbot:
    user: root
    image: ghcr.io/ioleksiy/openclaw-dckr:v2026.6.10
    restart: unless-stopped
    environment:
      - HOME=/home/node
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - TELEGRAM_OWNER_ID=${TELEGRAM_OWNER_ID}
      - OPENCLAW_CONFIG_PATH=/home/node/.openclaw/openclaw.json
      - OP_SERVICE_ACCOUNT_TOKEN=${OP_SERVICE_ACCOUNT_TOKEN:-}
      - OPENCLAW_GATEWAY_TOKEN=1234567890qwertyuiopasdfghjkl
      - OPENCLAW_WORKSPACE_DIR=${OPENCLAW_WORKSPACE_DIR:-/home/node/workspace-default}
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        chown -R node:node /home/node/.openclaw
        if [ ! -f /home/node/.openclaw/openclaw.json ]; then
          printf '{"gateway":{"mode":"local"},"agents":{"defaults":{"model":{"primary":"anthropic/claude-sonnet-4-6"}}},"channels":{"telegram":{"enabled":true,"dmPolicy":"allowlist","allowFrom":[%s]}}}\n' "$TELEGRAM_OWNER_ID" > /home/node/.openclaw/openclaw.json
        fi
        exec setpriv --reuid=node --regid=node --init-groups -- node dist/index.js gateway
    volumes:
      - oc-config:/home/node/.openclaw
      - oc-workspace:/home/node/workspace-default

volumes:
  oc-config:
  oc-workspace:
